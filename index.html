<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 날씨 대시보드 - 1211 윤성일</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Noto Sans KR', sans-serif; }
        .weather-card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; transition: transform 0.3s; }
        .weather-card:hover { transform: translateY(-5px); }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 0; border-radius: 0 0 30px 30px; margin-bottom: 30px; }
        .info-label { color: #666; font-size: 0.9rem; font-weight: 500; }
        .info-value { font-size: 2rem; font-weight: bold; color: #333; margin: 10px 0; }
        #loading { display: none; }
        .city-selector { margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        .city-btn { margin: 0; padding: 10px 20px; font-size: 1rem; }
        .city-btn.active { background-color: #667eea !important; color: white !important; border-color: #667eea !important; }
        .location-info { background-color: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .data-source { font-size: 0.85rem; color: #999; margin-top: 10px; }
        .error-message { color: #dc3545; font-weight: bold; padding: 10px; background-color: #f8d7da; border-radius: 5px; margin: 10px 0; }
        .weather-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin: 20px 0; }
        .weather-item { text-align: center; padding: 20px; background: #f8f9fa; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header text-center">
    <h1>🌤️ 실시간 날씨 대시보드</h1>
    <p>정보 교과 5월 프로젝트 수행평가 | <strong>1211 윤성일</strong></p>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <!-- 지역 선택 섹션 -->
            <div class="card weather-card p-4 mb-4">
                <h5 class="mb-3">🏙️ 지역 선택</h5>
                <div class="city-selector">
                    <button class="btn btn-outline-primary city-btn active" onclick="selectCity('서울', 60, 127)">서울</button>
                    <button class="btn btn-outline-primary city-btn" onclick="selectCity('인천', 54, 125)">인천</button>
                    <button class="btn btn-outline-primary city-btn" onclick="selectCity('대전', 68, 100)">대전</button>
                    <button class="btn btn-outline-primary city-btn" onclick="selectCity('광주', 59, 74)">광주</button>
                    <button class="btn btn-outline-primary city-btn" onclick="selectCity('대구', 89, 91)">대구</button>
                    <button class="btn btn-outline-primary city-btn" onclick="selectCity('울산', 102, 84)">울산</button>
                    <button class="btn btn-outline-primary city-btn" onclick="selectCity('부산', 99, 76)">부산</button>
                    <button class="btn btn-outline-primary city-btn" onclick="selectCity('제주', 52, 38)">제주</button>
                </div>
            </div>

            <!-- 날씨 정보 표시 섹션 -->
            <div class="card weather-card p-4 mb-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 id="location-title">📍 서울</h4>
                    <button class="btn btn-primary" onclick="fetchWeather()">새로고침</button>
                </div>
                <div id="error-container"></div>
                <hr>
                <div id="loading" class="text-center my-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">날씨 정보를 가져오는 중...</p>
                </div>
                <div id="weather-content" class="weather-grid">
                    <div class="weather-item">
                        <div class="info-label">현재 기온</div>
                        <div class="info-value" id="temp">-</div>
                    </div>
                    <div class="weather-item">
                        <div class="info-label">습도</div>
                        <div class="info-value" id="humidity">-</div>
                    </div>
                    <div class="weather-item">
                        <div class="info-label">강수량</div>
                        <div class="info-value" id="rain">-</div>
                    </div>
                    <div class="weather-item">
                        <div class="info-label">풍속</div>
                        <div class="info-value" id="wind">-</div>
                    </div>
                </div>
                <div class="data-source" id="data-source">데이터 출처: 기상청</div>
                <div class="mt-3 text-end text-muted" style="font-size: 0.8rem;">
                    최종 업데이트: <span id="update-time">-</span>
                </div>
            </div>

            <!-- 추천 정보 섹션 -->
            <div class="card weather-card p-4">
                <h5>💡 추천 옷차림 & 정보</h5>
                <ul class="mt-2" id="recommendations">
                    <li>지역을 선택하면 추천이 표시됩니다.</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<footer class="text-center mt-5 pb-4 text-muted">
    &copy; 2026 1211 윤성일. All rights reserved. <br>
    Data provided by 공공데이터포털 (기상청)
</footer>

<script>
    const API_KEY = 'f0646b0ddd72c825730d281eee88edde919d6cbd2c7385ac5546360905120820';
    
    // 지역별 격자 좌표 (기상청 공식 좌표)
    const CITIES = {
        '서울': { nx: 60, ny: 127 },
        '인천': { nx: 54, ny: 125 },
        '대전': { nx: 68, ny: 100 },
        '광주': { nx: 59, ny: 74 },
        '대구': { nx: 89, ny: 91 },
        '울산': { nx: 102, ny: 84 },
        '부산': { nx: 99, ny: 76 },
        '제주': { nx: 52, ny: 38 }
    };

    let currentCity = '서울';
    let currentNx = 60;
    let currentNy = 127;

    function selectCity(cityName, nx, ny) {
        currentCity = cityName;
        currentNx = nx;
        currentNy = ny;
        document.getElementById('location-title').innerText = `📍 ${cityName}`;
        
        // 버튼 활성화 상태 업데이트
        document.querySelectorAll('.city-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');
        
        // 날씨 정보 조회
        fetchWeather();
    }

    function isValidWeatherData(value) {
        if (value === null || value === undefined) return false;
        const numValue = parseFloat(value);
        return !isNaN(numValue) && numValue > -100;
    }

    function safeDisplayValue(value, unit) {
        if (!isValidWeatherData(value)) {
            return `데이터 없음`;
        }
        return `${value}${unit}`;
    }

    function showError(message) {
        const errorContainer = document.getElementById('error-container');
        errorContainer.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
        console.error(message);
    }

    function clearError() {
        document.getElementById('error-container').innerHTML = '';
    }

    async function fetchWeather() {
        const loading = document.getElementById('loading');
        const content = document.getElementById('weather-content');
        loading.style.display = 'block';
        content.style.opacity = '0.5';
        clearError();

        const now = new Date();
        let year = now.getFullYear();
        let month = String(now.getMonth() + 1).padStart(2, '0');
        let day = String(now.getDate()).padStart(2, '0');
        let hour = now.getHours();
        let minute = now.getMinutes();

        // 40분 이전이면 이전 시간 데이터 조회
        if (minute < 40) {
            hour -= 1;
            if (hour < 0) {
                hour = 23;
                const yesterday = new Date(now.getTime() - 24 * 60 * 60 * 1000);
                year = yesterday.getFullYear();
                month = String(yesterday.getMonth() + 1).padStart(2, '0');
                day = String(yesterday.getDate()).padStart(2, '0');
            }
        }
        
        const baseDate = `${year}${month}${day}`;
        const baseTime = `${String(hour).padStart(2, '0')}00`;

        console.log(`API 호출: ${currentCity}, baseDate=${baseDate}, baseTime=${baseTime}, nx=${currentNx}, ny=${currentNy}`);

        try {
            // 초단기실황 API 직접 호출 (CORS 프록시 없이)
            const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtNcst?serviceKey=${API_KEY}&pageNo=1&numOfRows=1000&dataType=JSON&base_date=${baseDate}&base_time=${baseTime}&nx=${currentNx}&ny=${currentNy}`;
            
            console.log('API URL:', url);
            
            const response = await fetch(url);
            console.log('Response status:', response.status);
            
            if (!response.ok) {
                throw new Error(`HTTP 오류! 상태: ${response.status}`);
            }

            const data = await response.json();
            console.log('API Response:', data);

            if (data.response.header.resultCode === '00') {
                const items = data.response.body.items.item;
                const weatherData = {};
                items.forEach(item => {
                    weatherData[item.category] = item.obsrValue;
                });

                console.log('Weather Data:', weatherData);

                document.getElementById('temp').innerText = safeDisplayValue(weatherData['T1H'], '°C');
                document.getElementById('humidity').innerText = safeDisplayValue(weatherData['REH'], '%');
                document.getElementById('rain').innerText = safeDisplayValue(weatherData['RN1'], 'mm');
                document.getElementById('wind').innerText = safeDisplayValue(weatherData['WSD'], 'm/s');
                document.getElementById('update-time').innerText = `${baseDate} ${baseTime}`;
                document.getElementById('data-source').innerText = `데이터 출처: 기상청 초단기실황`;
                
                updateRecommendations(weatherData['T1H'], weatherData['PTY']);
            } else {
                showError(`API 오류: ${data.response.header.resultMsg}`);
                console.error('API Error:', data.response.header);
            }

        } catch (error) {
            console.error('날씨 조회 오류:', error);
            showError('날씨 정보를 불러올 수 없습니다: ' + error.message);
        } finally {
            loading.style.display = 'none';
            content.style.opacity = '1';
        }
    }

    function updateRecommendations(temp, pty) {
        const recList = document.getElementById('recommendations');
        recList.innerHTML = '';
        
        if (!isValidWeatherData(temp)) {
            recList.innerHTML = '<li>날씨 데이터가 없어 추천을 제공할 수 없습니다.</li>';
            return;
        }

        let clothes = '';
        let extra = '';

        const t = parseFloat(temp);
        if (t >= 28) clothes = '민소매, 반바지, 원피스';
        else if (t >= 23) clothes = '반팔, 얇은 셔츠, 반바지, 면바지';
        else if (t >= 20) clothes = '긴팔티, 가디건, 후드티, 면바지, 슬랙스';
        else if (t >= 17) clothes = '니트, 가디건, 맨투맨, 청바지, 면바지';
        else if (t >= 12) clothes = '자켓, 가디건, 야상, 스타킹, 청바지, 면바지';
        else if (t >= 9) clothes = '코트, 가죽자켓, 히트텍, 니트, 청바지';
        else if (t >= 5) clothes = '코트, 가죽자켓, 히트텍, 니트, 청바지';
        else clothes = '패딩, 두꺼운 코트, 목도리, 기모제품';

        if (pty && pty !== '0') extra = '🌧️ 비나 눈이 올 수 있으니 우산을 챙기세요!';
        else extra = '☀️ 맑은 날씨입니다. 좋은 하루 되세요!';

        recList.innerHTML += `<li><strong>추천 옷차림:</strong> ${clothes}</li>`;
        recList.innerHTML += `<li><strong>오늘의 팁:</strong> ${extra}</li>`;
    }

    // 페이지 로드 시 서울 날씨 조회
    window.onload = function() {
        fetchWeather();
    };
</script>

</body>
</html>
